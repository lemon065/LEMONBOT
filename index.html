<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEMONBOT CBD SHOP 🌿🍋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo">
                    <span class="logo-emoji">🍋</span>
                    <span class="weapon">🔫</span>
                </div>
                <h1>LEMONBOT CBD SHOP</h1>
                <p class="tagline">🌿 Premium Quality 🌿</p>
            </div>
            <div class="header-actions">
                <button class="cart-btn" onclick="toggleCart()">
                    🛒 Panier <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="games-btn" onclick="toggleGames()">
                    🎮 Jeux
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar Menu -->
            <aside class="sidebar">
                <div class="menu-section">
                    <h2>📦 Menu</h2>
                    <button class="menu-btn active" onclick="filterProducts('all')">Tous les produits</button>
                    <button class="menu-btn" onclick="filterProducts('flower')">🌸 Fleurs</button>
                    <button class="menu-btn" onclick="filterProducts('oil')">🧴 Huiles</button>
                    <button class="menu-btn" onclick="filterProducts('edibles')">🍬 Comestibles</button>
                    <button class="menu-btn" onclick="filterProducts('vape')">💨 Vapes</button>
                    <button class="menu-btn" onclick="filterProducts('accessories')">🛠️ Accessoires</button>
                </div>

                <div class="info-section">
                    <h3>ℹ️ Infos</h3>
                    <p>Tous nos produits sont 100% légaux et de haute qualité.</p>
                    <p class="info-contact">📞 Support 24/7</p>
                </div>
            </aside>

            <!-- Products Section -->
            <section class="products-section">
                <h2 id="sectionTitle">🛍️ Tous les produits</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Les produits s'affichent ici -->
                </div>
            </section>
        </div>

        <!-- Cart Panel -->
        <div class="cart-panel" id="cartPanel">
            <div class="cart-content">
                <h2>🛒 Votre Panier</h2>
                <div class="cart-items" id="cartItems">
                    <p class="empty-cart">Votre panier est vide</p>
                </div>
                <div class="cart-total">
                    <strong>Total: $<span id="cartTotal">0.00</span></strong>
                </div>
                <button class="checkout-btn" onclick="checkout()">✅ Commander</button>
                <button class="close-btn" onclick="toggleCart()">❌ Fermer</button>
            </div>
        </div>

        <!-- Games Panel -->
        <div class="games-panel" id="gamesPanel">
            <div class="games-content">
                <h2>🎮 Zone de Jeux</h2>
                <div class="games-grid">
                    <button class="game-btn" onclick="startGame('grow')">🌱 Cultiver ta Plante</button>
                    <button class="game-btn" onclick="startGame('clicker')">🎯 Weed Clicker</button>
                    <button class="game-btn" onclick="startGame('spin')">🎡 Lucky Spin</button>
                    <button class="game-btn" onclick="startGame('memory')">🧠 Memory Game</button>
                </div>
                <button class="close-btn" onclick="toggleGames()">❌ Fermer</button>
            </div>
        </div>

        <!-- Game Container -->
        <div class="game-container" id="gameContainer" style="display: none;">
            <button class="close-game-btn" onclick="closeGame()">❌ Retour</button>
            <div class="game-content" id="gameContent"></div>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="games.js"></script>
    <script src="main.js"></script>
</body>
</html>
